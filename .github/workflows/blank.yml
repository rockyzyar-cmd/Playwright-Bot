name: Playwright Bot (CDP)

on:
  schedule:
    - cron: "*/10 * * * *"   # har 10 minute run hoga
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install

      - name: Start Chrome with CDP
        run: |
          google-chrome --remote-debugging-port=9222 --headless --no-sandbox &
          sleep 5   # wait for Chrome to be ready

      - name: Run script
        run: |
          python y.py
