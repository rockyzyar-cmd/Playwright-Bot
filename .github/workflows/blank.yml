name: Playwright Bot

on:
  schedule:
    - cron: "*/10 * * * *"   # har 10 minute me run hoga
  workflow_dispatch:          # manually run karne ka option

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install

      - name: Run script
        run: |
          python main.py
